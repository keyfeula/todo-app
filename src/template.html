<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>To-Do App</title>
    </head>
    <body>
        <header>
            <h1>To-Do App</h1>
            <img src="./writing.png" alt="to-do app icon">
        </header>
        <div class="sidebar">
            <h2>Projects</h2>
            <nav class="projects">
                <button class="project">Project 1</button>
                <button class="project">Project 2</button>
                <button class="new-project-btn">+</button>
            </nav>
        </div>
        <main>
            <div class="todo-item">
                <p>Title</p>
                <p>Description</p>
                <p>Due Date</p>
                <p>Priority</p>
                <button class="edit-btn">Edit</button>
                <button class="delete-btn">Delete</button>
            </div>
            <div class="todo-item">
                <p>Title</p>
                <p>Description</p>
                <p>Due Date</p>
                <p>Priority</p>
                <button class="edit-btn">Edit</button>
                <button class="delete-btn">Delete</button>
            </div>
        </main>
    </body>
</html>
