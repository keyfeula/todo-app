<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>To-Do App</title>
    </head>
    <body>
        <header>
            <h1>To-Do App</h1>
            <img src="./writing.png" alt="to-do app icon">
        </header>
        <div class="sidebar">
            <h2>Projects</h2>
            <nav class="projects">
                <button class="project">Project 1</button>
                <button class="project">Project 2</button>
                <button class="new-btn">+</button>
            </nav>
        </div>
        <main>
            <div class="todo-item">
                <p>Title</p>
                <p>Description</p>
                <p>Due Date</p>
                <p>Priority</p>
                <button class="edit-btn">Edit</button>
                <button class="delete-btn">Delete</button>
            </div>
            <div class="todo-item">
                <p>Title</p>
                <p>Description</p>
                <p>Due Date</p>
                <p>Priority</p>
                <button class="edit-btn">Edit</button>
                <button class="delete-btn">Delete</button>
            </div>
        </main>
        <dialog>
            <div class="dialog-container">
                <div class="form-option">
                    <h2>Create New...</h2>
                    <button autofocus>Project</button>
                    <button>To-Do Item</button>
                </div>
                <form>
                    <div class="form-field">
                        <label for="project-name">Project Name</label>
                        <input type="text" id="project-name">
                    </div>
                    <div class="form-buttons">
                        <button>Submit</button>
                        <button class="form-close-btn">Close</button>
                    </div>
                </form>
            </div>
        </dialog>
    </body>
</html>
